<!DOCTYPE html>
<html>
<head>
    <title>Smart Course Recommendation System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            rgba(15,23,42,0.8),
            rgba(30,41,59,0.8)
            ),
            url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1600");

            background-size:cover;
            background-position:center;
        }

        .login-container{

            width:450px;

            background:rgba(255,255,255,0.1);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:40px;

            text-align:center;

            color:white;

            box-shadow:
            0 8px 32px rgba(0,0,0,0.3);
        }

        .logo{
            font-size:70px;
            margin-bottom:10px;
        }

        h1{
            color:#38bdf8;
            margin-bottom:10px;
        }

        .subtitle{
            color:#d1d5db;
            margin-bottom:30px;
        }

        .input-group{
            text-align:left;
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        .input-group input{

            width:100%;

            padding:12px;

            border:none;

            border-radius:10px;

            font-size:15px;

            outline:none;
        }

        .login-btn{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#38bdf8;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .login-btn:hover{

            background:#0ea5e9;

            transform:scale(1.03);
        }

        .features{

            margin-top:25px;

            text-align:left;

            color:#e5e7eb;
        }

        .features p{
            margin:8px 0;
        }

        .footer{

            margin-top:20px;

            font-size:13px;

            color:#cbd5e1;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="logo">
            🎓
        </div>

        <h1>
            Smart Course Recommendation
        </h1>

        <p class="subtitle">
            Find the best courses based on your GPA and interests
        </p>

        <form action="/home" method="POST">

            <div class="input-group">

                <label>
                    👤 Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    required
                >

            </div>

            <div class="input-group">

                <label>
                    📧 Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <button
                type="submit"
                class="login-btn"
            >
                🚀 Login
            </button>

        </form>

        

        <div class="footer">

            Smart Course Recommendation System © 2026

        </div>

    </div>

</body>
</html>
